<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Between the Greens — SRPC Trap Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root {
      --green-dark: #1a3a1a;
      --green-mid: #2d5a27;
      --green-light: #4a8c40;
      --gold: #c8a84b;
      --gold-light: #e8c96b;
      --cream: #f5f0e8;
      --white: #ffffff;
      --gray-light: #f0ede6;
      --gray-mid: #d0ccc0;
      --gray-dark: #6b6560;
      --red: #8b2020;
      --text: #1a1a1a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: var(--green-dark);
      color: var(--text);
      min-height: 100vh;
    }

    #root { min-height: 100vh; }

    /* ─── HEADER ─── */
    .app-header {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
      border-bottom: 3px solid var(--gold);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-badge {
      width: 52px; height: 52px;
      background: var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }

    .header-text h1 {
      color: var(--gold);
      font-size: 1.6rem;
      letter-spacing: 1px;
    }

    .header-text p {
      color: var(--gray-mid);
      font-size: 0.85rem;
      font-style: italic;
    }

    .header-right {
      margin-left: auto;
      text-align: right;
    }

    .season-badge {
      background: var(--gold);
      color: var(--green-dark);
      font-weight: bold;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 12px;
      letter-spacing: 1px;
    }

    .admin-indicator {
      color: var(--gold-light);
      font-size: 0.75rem;
      margin-top: 4px;
    }

    /* ─── NAV ─── */
    .tab-nav {
      background: var(--green-mid);
      display: flex;
      gap: 2px;
      padding: 0 24px;
      border-bottom: 2px solid var(--gold);
      overflow-x: auto;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--gray-mid);
      padding: 12px 18px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab-btn:hover { color: var(--gold-light); }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
      font-weight: bold;
    }

    /* ─── MAIN CONTENT ─── */
    .main-content {
      background: var(--cream);
      min-height: calc(100vh - 140px);
      padding: 24px;
    }

    /* ─── STAT CARDS ─── */
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--white);
      border: 1px solid var(--gray-mid);
      border-top: 3px solid var(--green-light);
      border-radius: 6px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: var(--green-dark);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--gray-dark);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    .stat-sub {
      font-size: 0.7rem;
      color: var(--gray-dark);
      font-style: italic;
    }

    /* ─── TABLES ─── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    thead tr { background: var(--green-dark); }
    thead th {
      color: var(--gold);
      padding: 10px 12px;
      text-align: left;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      font-weight: normal;
    }

    tbody tr:nth-child(even) { background: var(--gray-light); }
    tbody tr:hover { background: #e8f0e8; }

    tbody td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--gray-mid);
      font-size: 0.9rem;
    }

    .td-name { font-weight: bold; color: var(--green-dark); }
    .td-center { text-align: center; }
    .td-score { text-align: center; font-weight: bold; }
    .td-good { color: var(--green-mid); }
    .td-low { color: var(--red); }

    /* ─── BADGES ─── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .badge-a { background: #c8f0c8; color: #1a5a1a; }
    .badge-b { background: #c8d8f0; color: #1a2a5a; }
    .badge-win { background: #c8f0c8; color: #1a5a1a; }
    .badge-loss { background: #f0c8c8; color: #5a1a1a; }
    .badge-pending { background: var(--gray-mid); color: var(--gray-dark); }
    .badge-absent { background: #f0e0c8; color: #5a3a1a; font-style: italic; }

    /* ─── SECTION TITLES ─── */
    .section-title {
      font-size: 1.1rem;
      color: var(--green-dark);
      border-bottom: 2px solid var(--gold);
      padding-bottom: 6px;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    /* ─── ROSTER CARDS ─── */
    .roster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .roster-card {
      background: var(--white);
      border: 1px solid var(--gray-mid);
      border-radius: 8px;
      overflow: hidden;
    }

    .roster-card-header {
      background: var(--green-dark);
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .roster-card-header h4 { color: var(--gold); font-size: 0.95rem; }

    .roster-card-body { padding: 12px; }

    .roster-stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid var(--gray-light);
      font-size: 0.85rem;
    }

    .roster-stat-label { color: var(--gray-dark); }
    .roster-stat-value { font-weight: bold; color: var(--green-dark); }

    /* ─── WEEK CARD ─── */
    .week-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .week-card {
      background: var(--white);
      border: 1px solid var(--gray-mid);
      border-radius: 8px;
      overflow: hidden;
    }

    .week-card-header {
      background: var(--green-mid);
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .week-card-title { color: var(--gold); font-weight: bold; }
    .week-card-date { color: var(--gray-mid); font-size: 0.8rem; }
    .week-card-body { padding: 12px; }

    /* ─── ADMIN PANEL ─── */
    .admin-panel {
      max-width: 600px;
    }

    .admin-login {
      background: var(--white);
      border: 1px solid var(--gray-mid);
      border-radius: 8px;
      padding: 32px;
      text-align: center;
    }

    .admin-login h3 { color: var(--green-dark); margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--gray-dark); margin-bottom: 6px; }

    input[type="password"], input[type="text"], input[type="number"], textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--gray-mid);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9rem;
      background: var(--white);
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--green-light);
      box-shadow: 0 0 0 2px rgba(74,140,64,0.2);
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--green-mid); color: var(--white); }
    .btn-primary:hover { background: var(--green-light); }
    .btn-gold { background: var(--gold); color: var(--green-dark); font-weight: bold; }
    .btn-gold:hover { background: var(--gold-light); }
    .btn-danger { background: var(--red); color: var(--white); }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

    .admin-section {
      background: var(--white);
      border: 1px solid var(--gray-mid);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .admin-section h4 {
      color: var(--green-dark);
      font-size: 0.95rem;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--gray-mid);
    }

    .upload-zone {
      border: 2px dashed var(--green-light);
      border-radius: 6px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      color: var(--gray-dark);
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .upload-zone:hover { border-color: var(--gold); background: var(--gray-light); }

    .result-box {
      background: var(--gray-light);
      border: 1px solid var(--gray-mid);
      border-radius: 4px;
      padding: 12px;
      font-size: 0.85rem;
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: monospace;
      max-height: 200px;
      overflow-y: auto;
    }

    .alert-success {
      background: #e8f5e8;
      border: 1px solid #4a8c40;
      color: #1a5a1a;
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 0.85rem;
    }

    .alert-info {
      background: #e8eef8;
      border: 1px solid #4a70c0;
      color: #1a2a5a;
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 0.85rem;
    }

    /* ─── FOOTER ─── */
    .app-footer {
      background: var(--green-dark);
      color: var(--gray-mid);
      text-align: center;
      padding: 12px;
      font-size: 0.75rem;
      border-top: 2px solid var(--gold);
    }

    /* ─── RECORD DISPLAY ─── */
    .record-display {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .record-w { color: var(--green-mid); }
    .record-l { color: var(--red); }
    .record-sep { color: var(--gray-dark); }

    @media (max-width: 600px) {
      .main-content { padding: 12px; }
      .stat-cards { grid-template-columns: repeat(2, 1fr); }
      .app-header { padding: 12px; }
      .header-text h1 { font-size: 1.2rem; }
    }

    /* ─── WEATHER CELL ─── */
    .weather-cell { font-size: 0.75rem; color: var(--gray-dark); text-align: center; line-height: 1.4; }
    .weather-temp { font-weight: bold; color: var(--green-dark); }

    /* ─── BEER BIRD DEBT BOARD ─── */
    .debt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .debt-card { background: var(--white); border: 1px solid var(--gray-mid); border-radius: 8px; padding: 14px 10px; text-align: center; }
    .debt-card.clear  { border-top: 3px solid #2ecc71; }
    .debt-card.owes   { border-top: 3px solid var(--red); }
    .debt-card.earned { border-top: 3px solid var(--gold); }
    .debt-name   { font-weight: bold; color: var(--green-dark); font-size: 0.84rem; margin-bottom: 6px; line-height: 1.3; }
    .debt-status { font-size: 1.4rem; font-weight: bold; margin: 4px 0; }
    .debt-status.clear-txt  { color: #2ecc71; }
    .debt-status.owes-txt   { color: var(--red); }
    .debt-status.earned-txt { color: var(--gold); }
    .debt-note { font-size: 0.72rem; color: var(--gray-dark); margin-top: 4px; }

    /* ─── SUMMARY STAT ROW ─── */
    .stat-row-sm { display: grid; grid-template-columns: repeat(auto-fit, minmax(135px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .stat-sm { background: var(--white); border: 1px solid var(--gray-mid); border-radius: 6px; padding: 10px; text-align: center; }
    .stat-sm-label { font-size: 0.68rem; color: var(--gray-dark); letter-spacing: 0.4px; text-transform: uppercase; }
    .stat-sm-value { font-size: 1.05rem; font-weight: bold; color: var(--green-dark); margin: 3px 0; }
    .stat-sm-sub { font-size: 0.7rem; color: var(--gray-dark); }

    /* ─── ROAST BOARD ─── */
    .roast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(285px, 1fr)); gap: 16px; }
    .roast-card { background: var(--white); border: 1px solid var(--gray-mid); border-radius: 8px; padding: 16px; }
    .roast-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .roast-name { font-weight: bold; color: var(--green-dark); font-size: 0.95rem; }
    .roast-stats-txt { font-size: 0.68rem; color: var(--gray-dark); line-height: 1.5; text-align: right; }
    .roast-body { font-size: 0.83rem; color: var(--text); line-height: 1.55; font-style: italic; margin-bottom: 10px; border-left: 3px solid var(--gray-mid); padding-left: 10px; }
    .roast-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .rtag { font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    .rtag-gold { background: var(--gold); color: var(--green-dark); }
    .rtag-red  { background: var(--red);  color: var(--white); }
    .rtag-def  { background: var(--green-dark); color: var(--gold-light); }
  </style>
</head>

      const week = SEASON_DATA[weekKey];

      const section = week[type];
      if (!section || !section.scores) return null;
      return section.scores[shooterName] ?? null;
    };

      let total = 0, count = 0;
      Object.keys(SEASON_DATA).forEach(wk => {
        const v = getShooterWeekTotal(shooterName, wk, type);
        if (v !== null) { total += v; count++; }
      });
      return count > 0 ? { total, count, avg: (total / count).toFixed(1) } : null;
    };

    const getWeekTeamTotal = (weekKey, type) => {
      const week = SEASON_DATA[weekKey];
      if (!week) return null;
      const section = week[type];
      if (!section) return null;
      if (section.teamTotal) return section.teamTotal;
      if (!section.scores) return null;
      return Object.values(section.scores).reduce((s, v) => s + (v || 0), 0);

        const arr = sec.scores[shooterName];
        arr.forEach((val, stIdx) => {
          if (val !== null) results.push({ week: wk, stIdx, val, estimated: !!sec.estimated });

      });
      return results;
    };

        const val = sec.scores[shooterName][stIdx];
        if (val !== null && val !== undefined) { total += val; count++; }
      });
      return count > 0 ? parseFloat((total / count).toFixed(2)) : null;

    function BeerBirds() {
      const shooters = ['Bill Curtis','Kevin Beckmann','Tim Michael','Brad Beckmann','Glenn Esselman','Dave Krupa'];

      // ── W6+ debt from BEER_BIRDS ──
      const debtMap = {};
      shooters.forEach(s => { debtMap[s] = { earned: 0, owed: 0 }; });
      BEER_BIRDS.forEach(b => {
        if (b.result === 'HIT') debtMap[b.shooter].earned++;
        else                    debtMap[b.shooter].owed++;
      });

      // ── Season miss totals ──
      const missTotals = {};
      shooters.forEach(s => {
        let total = 0, weeks = 0;
        Object.values(MISS_DATA).forEach(w => {
          if (w[s] !== null && w[s] !== undefined) { total += w[s]; weeks++; }
        });
        missTotals[s] = { total, weeks };
      });
      const sortedByMiss = [...shooters].sort((a,b) => missTotals[a].total - missTotals[b].total);
      const wkKeys = Object.keys(MISS_DATA);
      const teamTotal = Object.values(missTotals).reduce((a,v) => a + v.total, 0);

      return (
        <div>
          {/* ── DEBT BOARD ── */}
          <h2 className="section-title">🍺 Beer Bird Debt Board — 2026 Season</h2>
          <div className="alert-info" style={{marginBottom:'16px'}}>
            <strong>Rules:</strong> HIT = club owes shooter a beer &nbsp;·&nbsp; MISS = shooter buys the whole team a round
            <span style={{marginLeft:'12px',fontSize:'0.78rem',color:'var(--gray-dark)'}}>Formal tracking active from W6 forward</span>
          </div>

          <div className="debt-grid">
            {shooters.map(s => {
              const d = debtMap[s];
              let cardClass = 'clear', statusClass = 'clear-txt', statusText = '✓ Clear';
              if (d.earned > 0 && d.owed === 0) { cardClass = 'earned'; statusClass = 'earned-txt'; statusText = `🍺 ×${d.earned}`; }
              else if (d.owed > 0)               { cardClass = 'owes';   statusClass = 'owes-txt';   statusText = `Owes ×${d.owed}`; }
              const noteText = d.earned > 0 ? `Club owes ${d.earned} beer${d.earned>1?'s':''}` :

                               'Nothing owed';
              const parts = s.split(' ');
              return (
                <div key={s} className={`debt-card ${cardClass}`}>
                  <div className="debt-name">{parts[0]}<br/>{parts[1]}</div>
                  <div className={`debt-status ${statusClass}`}>{statusText}</div>
                  <div className="debt-note">{noteText}</div>

    function Admin({ adminMode, onLogin, onLogout }) {
      const [pw, setPw] = useState('');
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('btg_api_key') || '');
      const [uploadResult, setUploadResult] = useState('');
      const [uploading, setUploading] = useState(false);
      const fileRef = useRef(null);

      const saveApiKey = (key) => {
        setApiKey(key);
        localStorage.setItem('btg_api_key', key);
      };

      const handleUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (!apiKey) { alert('Set your Claude API key in Settings first.'); return; }

        setUploading(true);
        setUploadResult('Processing scorecard...');

        const reader = new FileReader();
        reader.onload = async (ev) => {
          const base64 = ev.target.result.split(',')[1];
          try {
            const res = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'x-api-key': apiKey,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json',
              },
              body: JSON.stringify({
                model: 'claude-opus-4-6',
                max_tokens: 1024,
                messages: [{
                  role: 'user',
                  content: [
                    { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
                    { type: 'text', text: `You are reading an SRPC Tuesday Night Trap League scorecard. Extract ALL shooter names, their station-by-station scores (stations 1-6, up to 5 birds each), and totals. Return valid JSON:
{"class":"A or B","yardage":number,"shooters":[{"name":"string","scores":[s1,s2,s3,s4,s5],"total":number}]}
Return ONLY the JSON. No markdown.` }
                  ]
                }]
              })
            });
            const data = await res.json();
            const text = data.content?.[0]?.text || 'No response';
            setUploadResult(text);
          } catch (err) {
            setUploadResult('Error: ' + err.message);
          }
          setUploading(false);
        };
        reader.readAsDataURL(file);
      };

      if (!adminMode) {
        return (
          <div className="admin-panel">
            <div className="admin-login">
              <h3>🎯 Admin Access</h3>
              <div className="form-group">
                <label>Password</label>
                <input
                  type="password"
                  value={pw}
                  onChange={e => setPw(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && onLogin(pw)}
                  placeholder="Enter password"
                  autoFocus
                />
              </div>
              <button className="btn btn-gold" onClick={() => onLogin(pw)} style={{width:'100%'}}>
                Login
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="admin-panel">
          <div className="alert-success">✓ Admin mode active</div>

          <div className="admin-section">
            <h4>📸 Upload Scorecard Photo</h4>
            <div className="upload-zone" onClick={() => fileRef.current?.click()}>
              {uploading ? '⏳ Processing with Claude AI...' : '📷 Click to upload scorecard photo'}
              <br/><small style={{color:'var(--gray-dark)'}}>JPG, PNG supported · Claude reads the card automatically</small>
            </div>
            <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleUpload} />
            {uploadResult && <div className="result-box">{uploadResult}</div>}
          </div>

          <div className="admin-section">
            <h4>🔑 Claude API Key</h4>
            <div className="form-group">
              <label>API Key (stored locally, never transmitted except to Anthropic)</label>
              <input
                type="password"
                value={apiKey}
                onChange={e => saveApiKey(e.target.value)}
                placeholder="sk-ant-..."
              />
            </div>
            <small style={{color:'var(--gray-dark)'}}>Get your key at console.anthropic.com</small>
          </div>

          <button className="btn btn-danger btn-sm" onClick={onLogout}>Logout</button>
        </div>
      );
    }

        { key: 'roster',     label: 'Roster'          },
        { key: 'station',    label: '📊 Station Avgs' },
        { key: 'schedule',   label: 'Schedule'        },
        { key: 'beerbirds',  label: '🍺 Beer Birds'   },
        { key: 'roast',      label: '🔥 Roast Board'  },
        { key: 'admin',      label: adminMode ? '⚙ Admin' : 'Admin' },
      ];

      return (
        <div>
          <header className="app-header">
            <div className="header-badge">🎯</div>
            <div className="header-text">
              <h1>Between the Greens</h1>
              <p>SRPC Tuesday Night Trap League · Team 5</p>
            </div>
            <div className="header-right">
              <div className="season-badge">2026 SEASON</div>
              {adminMode && <div className="admin-indicator">Admin Active</div>}
            </div>
          </header>

          <nav className="tab-nav">
            {TABS.map(t => (
              <button
                key={t.key}
                className={`tab-btn ${tab === t.key ? 'active' : ''}`}
                onClick={() => setTab(t.key)}
              >
                {t.label}
              </button>
            ))}
          </nav>

          <main className="main-content">
            {tab === 'overview'  && <Overview />}
            {tab === 'standings' && <Standings />}
            {tab === 'roster'    && <Roster />}
            {tab === 'station'   && <StationAverages />}
            {tab === 'schedule'  && <Schedule />}
            {tab === 'beerbirds' && <BeerBirds />}
            {tab === 'roast'     && <RoastBoard />}
            {tab === 'admin'     && <Admin adminMode={adminMode} onLogin={handleLogin} onLogout={() => setAdminMode(false)} />}
          </main>

          <footer className="app-footer">
            Between the Greens · SRPC Tuesday Night Trap · Team 5 · Captain: Brad Beckmann
            &nbsp;|&nbsp; Built with Claude
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
